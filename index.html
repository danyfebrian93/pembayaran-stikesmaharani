<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Meta Viewport sangat penting agar tampilan bersih di HP -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aplikasi Pembayaran STIKES Maharani</title>
    
    <!-- PWA Meta -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#003B73">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#003B73',   
                        accent: '#F4B41A',    
                        danger: '#ef4444'
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Menghilangkan elemen bawaan Blogger yang merusak tampilan */
        #navbar-iframe, .navbar, .header-widget, .sidebar, .footer-widget, .comments { 
            display: none !important; visibility: hidden !important; height: 0 !important; 
        }
        
        body { 
            margin: 0; padding: 0; background-color: #f8fafc; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Menghilangkan padding bawaan body Blogger */
        .content-inner, .main-inner, .post-body { padding: 0 !important; margin: 0 !important; }

        .hidden-view { display: none; }
        
        /* Gaya khusus input agar rapi di mobile */
        input, select, textarea {
            font-size: 16px !important; /* Mencegah auto-zoom di iOS */
            appearance: none;
            -webkit-appearance: none;
            border-radius: 0.75rem;
        }

        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* Loading spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #F4B41A;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Smooth Transition */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-800">

    <script>
        /**
         * PENTING: Masukkan URL Google Apps Script Anda di bawah ini.
         * Contoh: "https://script.google.com/macros/s/AKfycbz.../exec"
         */
        const  = "URL_WEB_APP_ANDA_DI_SINI"; 

        let currentUser = null; 

        async function callGAS(action, payload = {}) {
            if (! || .includes("https://script.google.com/macros/s/AKfycbziQSRPWBx7XHc7OEvb3Pc9mU42m1RhriViO7iXx8n_rhUZXo3GTyMkesHGWDmfXN8J0Q/exec")) {
                Swal.fire({
                    title: "Konfigurasi Belum Siap",
                    text: "Silakan masukkan URL Web App Google Apps Script Anda ke dalam kode (index.html) terlebih dahulu.",
                    icon: "warning",
                    confirmButtonColor: "#003B73"
                });
                return { success: false };
            }
            try {
                const response = await fetch(, {
                    method: "POST",
                    body: JSON.stringify({ action, payload })
                });
                return await response.json();
            } catch (error) {
                console.error("Error:", error);
                return { success: false, message: "Gagal terhubung ke server. Pastikan internet aktif." };
            }
        }
    </script>

    <!-- VIEW LOGIN -->
    <div id="view-login" class="min-h-screen flex items-center justify-center p-6 bg-[#003B73]">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm card-shadow fade-in">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-blue-50 text-primary rounded-3xl flex items-center justify-center mx-auto mb-4 text-4xl shadow-inner">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <h1 class="text-2xl font-black text-primary tracking-tight">STIKES</h1>
                <p class="text-primary font-medium text-xs tracking-widest uppercase">Maharani Malang</p>
                <div class="h-1 w-10 bg-accent mx-auto mt-3 rounded-full"></div>
            </div>
            
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">NIM / Username</label>
                    <input class="w-full px-4 py-3 bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-accent/50 outline-none transition-all" id="username" type="text" placeholder="Masukkan NIM Anda" required>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Password</label>
                    <input class="w-full px-4 py-3 bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-accent/50 outline-none transition-all" id="password" type="password" placeholder="••••••••" required>
                </div>
                <button class="w-full bg-primary hover:bg-slate-800 text-white font-bold py-4 rounded-2xl transition-all shadow-lg flex items-center justify-center gap-3 text-sm mt-2" type="submit">
                    MASUK KE PORTAL
                </button>
            </form>
            <p class="text-center text-[10px] text-slate-400 mt-8 font-medium">© 2026 IT Support STIKES Maharani</p>
        </div>
    </div>

    <!-- VIEW MAHASISWA -->
    <div id="view-mahasiswa" class="min-h-screen hidden-view fade-in">
        <header class="bg-[#003B73] text-white p-5 sticky top-0 z-50 shadow-lg rounded-b-[2rem]">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-accent rounded-xl flex items-center justify-center text-primary shadow-lg">
                        <i class="fa-solid fa-user-graduate"></i>
                    </div>
                    <div>
                        <p class="text-[10px] opacity-70 leading-none mb-1 font-bold uppercase tracking-tighter">Mahasiswa</p>
                        <p class="font-bold text-sm truncate max-w-[150px]" id="mhsNameDisplay">Memuat Nama...</p>
                    </div>
                </div>
                <button onclick="logout()" class="bg-white/10 p-2.5 rounded-xl hover:bg-white/20 transition-all border border-white/10">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </header>

        <main class="p-5 space-y-6 pb-10">
            <!-- Form Upload -->
            <div class="bg-white rounded-[2rem] p-6 card-shadow border border-slate-100">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-1.5 h-6 bg-accent rounded-full"></div>
                    <h2 class="text-sm font-bold text-slate-800">Kirim Bukti Pembayaran</h2>
                </div>
                
                <form onsubmit="handleUpload(event)" class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 ml-1">Nominal Transfer</label>
                        <input type="text" id="mhsNominal" oninput="formatCurrencyInput(this)" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 text-sm focus:ring-2 focus:ring-accent/20" placeholder="Rp 0" required>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 ml-1">Semester</label>
                            <select id="mhsSemester" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 text-sm" required>
                                <option value="" disabled selected>Pilih...</option>
                                <option value="Semester 1 (Ganjil)">1 (Ganjil)</option>
                                <option value="Semester 2 (Genap)">2 (Genap)</option>
                                <option value="Semester 3 (Ganjil)">3 (Ganjil)</option>
                                <option value="Semester 4 (Genap)">4 (Genap)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1.5 ml-1">Tipe</label>
                            <select id="mhsJenis" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 text-sm" required>
                                <option value="" disabled selected>Pilih...</option>
                                <option value="Lunas">Lunas</option>
                                <option value="Cicilan">Cicilan</option>
                            </select>
                        </div>
                    </div>

                    <div class="relative border-2 border-dashed border-slate-200 rounded-2xl p-6 text-center hover:bg-slate-50 transition-all cursor-pointer">
                        <input type="file" id="mhsFile" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="updateFileName(this)" required>
                        <i class="fa-solid fa-cloud-arrow-up text-slate-300 text-3xl mb-2"></i>
                        <p class="text-xs text-slate-500 font-bold" id="mhsFileName">Ketuk untuk Ambil Foto Bukti</p>
                        <p class="text-[9px] text-slate-400 mt-1">Format: JPG, PNG (Maks 1MB)</p>
                    </div>

                    <button type="submit" class="w-full bg-accent text-primary font-black py-4 rounded-2xl shadow-xl shadow-accent/20 active:scale-95 transition-all text-sm">
                        KIRIM SEKARANG
                    </button>
                </form>
            </div>

            <!-- Riwayat -->
            <div>
                <div class="flex items-center justify-between mb-4 px-2">
                    <h2 class="text-sm font-bold text-slate-800">Riwayat Transaksi</h2>
                    <span class="text-[10px] bg-slate-200 text-slate-600 px-2 py-1 rounded-full font-bold">Terbaru</span>
                </div>
                <div id="mhsTableBody" class="space-y-3">
                    <!-- Data riwayat akan muncul di sini -->
                </div>
            </div>
        </main>
    </div>

    <!-- VIEW ADMIN -->
    <div id="view-admin" class="min-h-screen hidden-view bg-slate-50 fade-in">
        <header class="bg-slate-900 text-white p-5 sticky top-0 z-50 rounded-b-3xl">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-red-500 rounded-lg flex items-center justify-center">
                        <i class="fa-solid fa-shield-halved text-sm"></i>
                    </div>
                    <span class="font-black text-xs tracking-widest uppercase">Admin Panel</span>
                </div>
                <button onclick="logout()" class="text-[10px] bg-white/10 px-4 py-2 rounded-xl font-bold border border-white/10">KELUAR</button>
            </div>
        </header>

        <div class="p-5 space-y-5">
            <!-- Ringkasan Statistik -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-5 rounded-3xl border border-slate-100 card-shadow">
                    <i class="fa-solid fa-clock text-yellow-500 mb-2"></i>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Menunggu</p>
                    <p id="statWait" class="text-2xl font-black text-slate-800 tracking-tighter">0</p>
                </div>
                <div class="bg-white p-5 rounded-3xl border border-slate-100 card-shadow">
                    <i class="fa-solid fa-circle-check text-green-500 mb-2"></i>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Selesai</p>
                    <p id="statSuccess" class="text-2xl font-black text-slate-800 tracking-tighter">0</p>
                </div>
            </div>

            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Antrean Verifikasi</h3>
            <div id="adminTableBody" class="space-y-4 pb-10">
                <!-- Data antrean admin -->
            </div>
        </div>
    </div>

    <!-- GLOBAL LOADER -->
    <div id="loaderGlobal" class="fixed inset-0 bg-[#003B73]/90 backdrop-blur-md z-[100] flex flex-col items-center justify-center hidden">
        <div class="loader mb-4 scale-150"></div>
        <p class="text-xs font-black text-white uppercase tracking-[0.3em] animate-pulse">Menghubungkan Server</p>
    </div>

    <script>
        // Fungsi Formatter
        function formatRp(angka) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
        }

        function formatCurrencyInput(input) {
            let value = input.value.replace(/[^0-9]/g, '');
            if (value) input.value = new Intl.NumberFormat('id-ID').format(value);
        }

        // Navigasi Antar Halaman
        function switchView(viewId) {
            ['view-login', 'view-mahasiswa', 'view-admin'].forEach(id => document.getElementById(id).classList.add('hidden-view'));
            document.getElementById(viewId).classList.remove('hidden-view');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Proses Login
        async function handleLogin(e) {
            e.preventDefault();
            toggleLoader(true);
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const res = await callGAS("LOGIN", { username, password });

            if (res.success) {
                currentUser = res;
                if (res.role === "Admin") {
                    switchView('view-admin');
                    loadAdminData();
                } else {
                    document.getElementById('mhsNameDisplay').innerText = res.name;
                    switchView('view-mahasiswa');
                    loadMahasiswaData();
                }
            } else {
                Swal.fire({ title: "Gagal Masuk", text: res.message, icon: "error", confirmButtonColor: "#ef4444" });
            }
            toggleLoader(false);
        }

        // Ambil Data Mahasiswa
        async function loadMahasiswaData() {
            const res = await callGAS("GET_MHS_DATA", { username: currentUser.username });
            const container = document.getElementById('mhsTableBody');
            container.innerHTML = '';

            if (res.success && res.data.length > 0) {
                res.data.forEach(item => {
                    const statusClass = item.status === 'Diterima' ? 'bg-green-50 text-green-600 border-green-100' : 
                                      item.status === 'Ditolak' ? 'bg-red-50 text-red-600 border-red-100' : 
                                      'bg-yellow-50 text-yellow-600 border-yellow-100';
                    
                    container.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-100 shadow-sm">
                            <div class="flex gap-3 items-center">
                                <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400">
                                    <i class="fa-solid fa-receipt"></i>
                                </div>
                                <div>
                                    <p class="text-[10px] text-slate-400 font-bold uppercase">${item.date.split(' ')[0]}</p>
                                    <p class="text-xs font-black text-slate-800">${item.semester}</p>
                                    <p class="text-[9px] text-slate-500 font-medium">${item.jenis}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-sm font-black text-slate-900">${formatRp(item.nominal)}</p>
                                <span class="text-[9px] font-black px-2 py-1 rounded-lg border ${statusClass}">${item.status.toUpperCase()}</span>
                            </div>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = `
                    <div class="p-10 text-center bg-white rounded-3xl border border-dashed border-slate-200">
                        <i class="fa-solid fa-folder-open text-slate-200 text-4xl mb-2"></i>
                        <p class="text-xs text-slate-400 font-bold">Belum ada riwayat pembayaran</p>
                    </div>`;
            }
        }

        // Ambil Data Admin
        async function loadAdminData() {
            const res = await callGAS("GET_ADMIN_DATA");
            const container = document.getElementById('adminTableBody');
            container.innerHTML = '';

            if (res.success) {
                document.getElementById('statWait').innerText = res.data.filter(i => i.status === 'Menunggu').length;
                document.getElementById('statSuccess').innerText = res.data.filter(i => i.status === 'Diterima').length;

                const pending = res.data.filter(item => item.status === 'Menunggu');
                
                if (pending.length === 0) {
                    container.innerHTML = `<div class="p-10 text-center text-slate-400 font-bold text-xs italic">Semua laporan sudah terverifikasi ✓</div>`;
                    return;
                }

                pending.forEach(item => {
                    container.innerHTML += `
                        <div class="bg-white p-5 rounded-[2rem] card-shadow border border-slate-100">
                            <div class="flex justify-between items-start mb-4">
                                <div class="flex gap-3">
                                    <div class="w-10 h-10 bg-blue-50 text-primary rounded-xl flex items-center justify-center font-black text-xs">
                                        ${item.username.substring(0,2)}
                                    </div>
                                    <div>
                                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">${item.username}</p>
                                        <p class="text-sm font-black text-slate-800 leading-tight">${item.name}</p>
                                    </div>
                                </div>
                                <p class="text-sm font-black text-primary">${formatRp(item.nominal)}</p>
                            </div>
                            <div class="grid grid-cols-3 gap-2">
                                <button onclick="window.open('${item.file}', '_blank')" class="bg-slate-900 text-white py-2.5 rounded-xl text-[9px] font-black uppercase tracking-wider">Bukti</button>
                                <button onclick="verifyAction('${item.id}', 'Diterima')" class="bg-green-500 text-white py-2.5 rounded-xl text-[9px] font-black uppercase tracking-wider">Terima</button>
                                <button onclick="rejectPrompt('${item.id}')" class="bg-red-500 text-white py-2.5 rounded-xl text-[9px] font-black uppercase tracking-wider">Tolak</button>
                            </div>
                        </div>
                    `;
                });
            }
        }

        // Proses Submit Pembayaran
        async function handleUpload(e) {
            e.preventDefault();
            toggleLoader(true);
            const fileInput = document.getElementById('mhsFile');
            if (!fileInput.files[0]) {
                Swal.fire("Peringatan", "Harap lampirkan foto bukti transfer.", "warning");
                toggleLoader(false);
                return;
            }
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = async function() {
                const base64 = reader.result.split(',')[1];
                const res = await callGAS("SUBMIT_PAYMENT", {
                    username: currentUser.username,
                    name: currentUser.name,
                    nominal: parseInt(document.getElementById('mhsNominal').value.replace(/\./g, '')),
                    semester: document.getElementById('mhsSemester').value,
                    jenis: document.getElementById('mhsJenis').value,
                    fileName: file.name,
                    mimeType: file.type,
                    fileBase64: base64
                });
                if (res.success) {
                    Swal.fire({ title: "Berhasil!", text: "Bukti pembayaran telah dikirim.", icon: "success", confirmButtonColor: "#F4B41A" });
                    document.getElementById('mhsFile').value = "";
                    document.getElementById('mhsNominal').value = "";
                    document.getElementById('mhsFileName').innerText = "Ketuk untuk Ambil Foto Bukti";
                    loadMahasiswaData();
                }
                toggleLoader(false);
            };
            reader.readAsDataURL(file);
        }

        async function verifyAction(id, status, reason = "") {
            toggleLoader(true);
            const res = await callGAS("VERIFY_PAYMENT", { id, status, reason });
            if (res.success) loadAdminData();
            toggleLoader(false);
        }

        function rejectPrompt(id) {
            Swal.fire({
                title: 'Alasan Penolakan',
                text: 'Berikan alasan singkat kepada mahasiswa',
                input: 'textarea',
                inputPlaceholder: 'Contoh: Foto bukti tidak terbaca...',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonText: 'Batal',
                confirmButtonText: 'Tolak Bukti'
            }).then((result) => {
                if (result.isConfirmed && result.value) {
                    verifyAction(id, 'Ditolak', result.value);
                }
            });
        }

        function toggleLoader(show) {
            const loader = document.getElementById('loaderGlobal');
            if (show) loader.classList.remove('hidden');
            else loader.classList.add('hidden');
        }

        function updateFileName(input) {
            document.getElementById('mhsFileName').innerText = input.files[0] ? input.files[0].name : "Ketuk untuk Ambil Foto Bukti";
        }

        function logout() {
            currentUser = null;
            switchView('view-login');
        }

        // PWA Service Worker Registration - Fixed for Sandbox environments
        window.addEventListener('load', () => {
            // Kita hanya mendaftar SW jika protokolnya aman (bukan blob: atau file:)
            if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.warn("Service Worker registration skipped (expected in preview):", err.message);
                });
            }
        });
    </script>
</body>
</html>
